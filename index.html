<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Market — Premium E-Commerce</title>
  <meta name="theme-color" content="#0B0D17" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: { 900: '#0B0D17', 800: '#111427', 700: '#161A2E', 600: '#1C2039', 500: '#242844' },
            neon: { cyan: '#00E5FF', purple: '#B026FF', pink: '#FF2D95' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>

  <style>
    body { background: #0B0D17; color: #f0f0f5; overflow-x: hidden; }
    .glass { background: rgba(11, 13, 23, 0.85); backdrop-filter: blur(24px); }
    .neon-btn { background: linear-gradient(135deg, #00E5FF, #B026FF); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #242844; border-radius: 99px; }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- Product Data -->
  <script src="/data/products.js"></script>

  <!-- Vite Entry Point -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
