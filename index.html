<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Market — Premium E-Commerce V2</title>
  <meta name="theme-color" content="#0B0D17" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: { 900: '#0B0D17', 800: '#111427', 700: '#161A2E', 600: '#1C2039', 500: '#242844' },
            neon: { cyan: '#00E5FF', purple: '#B026FF', pink: '#FF2D95' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          animation: {
            'glow': 'glow 2s ease-in-out infinite alternate',
            'skeleton': 'skeleton 1.5s ease-in-out infinite'
          },
          keyframes: {
            glow: { '0%': { boxShadow: '0 0 20px #00E5FF40' }, '100%': { boxShadow: '0 0 40px #00E5FF60, 0 0 60px #B026FF30' } },
            skeleton: { '0%, 100%': { opacity: 0.3 }, '50%': { opacity: 0.1 } }
          }
        }
      }
    }
  </script>

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0B0D17;
      color: #f0f0f5;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0B0D17;
    }

    ::-webkit-scrollbar-thumb {
      background: #242844;
      border-radius: 99px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #00E5FF40;
    }

    .magnifier-container {
      cursor: crosshair;
    }

    .neon-btn {
      background: linear-gradient(135deg, #00E5FF, #B026FF);
      transition: all 0.3s ease;
    }

    .neon-btn:hover {
      box-shadow: 0 0 25px #00E5FF50, 0 0 45px #B026FF30;
      transform: scale(1.02);
    }

    .glass {
      background: rgba(11, 13, 23, 0.85);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
    }

    .chat-msg-bot {
      background: linear-gradient(135deg, #111427, #1C2039);
    }

    .chat-msg-user {
      background: linear-gradient(135deg, #00E5FF10, #B026FF10);
      border: 1px solid #00E5FF30;
    }
  </style>

  <!-- Import maps for React, Framer Motion, and Lucide without npm -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "framer-motion": "https://esm.sh/framer-motion@10.16.4?deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>

  <!-- Product Data -->
  <script src="data/products.js"></script>

  <!-- Babel Standalone (JSX compilation) -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <!-- Main App Logic -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useContext, createContext, useCallback, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { motion, AnimatePresence } from 'framer-motion';
    import * as Lucide from 'lucide-react';

    // ═══════════════════════════════════════════
    //  GLOBAL STATE (Context API & Custom Hooks)
    // ═══════════════════════════════════════════
    const StoreContext = createContext();

    function StoreProvider({ children }) {
      const [activeProduct, setActiveProduct] = useState(null);
      const [searchQuery, setSearchQuery] = useState("");
      const [selectedCategory, setSelectedCategory] = useState("Todos");

      const value = useMemo(() => ({
        activeProduct, setActiveProduct,
        searchQuery, setSearchQuery,
        selectedCategory, setSelectedCategory
      }), [activeProduct, searchQuery, selectedCategory]);

      return <StoreContext.Provider value={value}>{children}</StoreContext.Provider>;
    }

    function useStore() { return useContext(StoreContext); }


    // ═══════════════════════════════════════════
    //  TOP BAR
    // ═══════════════════════════════════════════
    function TopBar() {
      return (
        <div className="bg-dark-800 border-b border-white/5 h-8 flex items-center justify-between px-4 md:px-6 text-[11px] text-gray-500 font-medium tracking-wide">
          <div className="flex items-center gap-5">
            <a href="mailto:info@techmarket.com" className="flex items-center gap-1.5 hover:text-neon-cyan transition-colors">
              <Lucide.Mail size={12} /> info@techmarket.com
            </a>
            <a href="https://wa.me/573000000000" target="_blank" className="flex items-center gap-1.5 hover:text-neon-cyan transition-colors">
              <Lucide.Phone size={12} /> +57 300 000 0000
            </a>
          </div>
          <div className="flex items-center gap-4">
            <a href="#" className="hover:text-neon-cyan transition-colors"><Lucide.Github size={14} /></a>
            <a href="#" className="hover:text-neon-cyan transition-colors"><Lucide.Linkedin size={14} /></a>
          </div>
        </div>
      );
    }


    // ═══════════════════════════════════════════
    //  HEADER (Glassmorphism + Logo)
    // ═══════════════════════════════════════════
    function Header() {
      const { searchQuery, setSearchQuery, cartCount, setIsCartOpen } = useStore();
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

      return (
        <header className="sticky top-0 z-40 glass border-b border-white/[0.04]">
          <div className="max-w-7xl mx-auto px-4 md:px-6 h-16 md:h-20 flex items-center justify-between gap-4">

            {/* Logo & Mobile Menu Toggle */}
            <div className="flex items-center gap-2">
              <button className="md:hidden p-2 text-gray-400 hover:text-neon-cyan" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                <Lucide.Menu size={24} />
              </button>

              <div className="flex items-center cursor-pointer group">
                <div className="relative flex items-center gap-2">
                  <div className="relative">
                    <Lucide.Zap size={28} className="text-neon-cyan relative z-10 filter drop-shadow-[0_0_8px_#00E5FF80]" />
                    <motion.div 
                      animate={{ scale: [1, 1.2, 1], opacity: [0.3, 0.6, 0.3] }}
                      transition={{ duration: 2, repeat: Infinity }}
                      className="absolute inset-0 bg-neon-cyan rounded-full blur-md"
                    />
                  </div>
                  <span className="text-xl md:text-2xl font-black tracking-tighter text-white group-hover:text-neon-cyan transition-colors">
                    TECH<span className="text-neon-cyan group-hover:text-white transition-colors">MARKET</span>
                  </span>
                </div>
              </div>
            </div>

            {/* Search Bar (Desktop) */}
            <div className="hidden md:block flex-1 max-w-lg mx-6">
              <div className="relative group">
                <Lucide.Search size={16} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-neon-cyan transition-colors" />
                <input
                  type="text" placeholder="Geforce RTX, MacBook, Audífonos..." value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full pl-10 pr-4 py-2.5 bg-dark-700/60 border border-white/[0.06] rounded-xl text-sm text-white placeholder-gray-500 focus:outline-none focus:border-neon-cyan/40 focus:bg-dark-700 focus:shadow-[0_0_15px_#00E5FF15] transition-all duration-300"
                />
              </div>
            </div>

            {/* Right Actions */}
            <div className="flex items-center gap-1 md:gap-3">
              <button className="hidden sm:block p-2.5 text-gray-400 hover:text-neon-cyan transition-colors rounded-xl hover:bg-white/5">
                <Lucide.User size={22} />
              </button>
            </div>
          </div>

          {/* Mobile Search Bar (Collapsible) */}
          <AnimatePresence>
            {mobileMenuOpen && (
              <motion.div
                initial={{ height: 0, opacity: 0 }}
                animate={{ height: 'auto', opacity: 1 }}
                exit={{ height: 0, opacity: 0 }}
                className="md:hidden overflow-hidden border-t border-white/5 bg-dark-800"
              >
                <div className="p-4">
                  <div className="relative">
                    <Lucide.Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500" />
                    <input
                      type="text" placeholder="Buscar productos..." value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full pl-10 pr-4 py-2 bg-dark-700 border border-white/[0.06] rounded-lg text-sm text-white focus:outline-none focus:border-neon-cyan/40"
                    />
                  </div>
                </div>
              </motion.div>
            )}
          </AnimatePresence>
        </header>
      );
    }


    // ═══════════════════════════════════════════
    //  CATEGORY FILTERS
    // ═══════════════════════════════════════════
    function CategoryFilters() {
      const { selectedCategory, setSelectedCategory } = useStore();
      const cats = ["Todos", "Periféricos", "Accesorios", "Audio", "Smart Home", "Software"];

      return (
        <div className="flex overflow-x-auto gap-3 pb-4 mb-6 scrollbar-hide">
          {cats.map(cat => {
            const active = selectedCategory === cat;
            return (
              <button
                key={cat} onClick={() => setSelectedCategory(cat)}
                className={`whitespace-nowrap px-4 py-1.5 rounded-full text-[13px] font-medium transition-all duration-300 border ${active
                  ? 'bg-neon-cyan/10 text-neon-cyan border-neon-cyan shadow-[0_0_10px_#00E5FF20]'
                  : 'bg-dark-800 text-gray-400 border-white/[0.06] hover:bg-dark-700 hover:text-white hover:border-white/20'
                  }`}
              >
                {cat}
              </button>
            );
          })}
        </div>
      );
    }


    // ═══════════════════════════════════════════
    //  PRODUCT GRID & CARDS
    // ═══════════════════════════════════════════
    const containerVariants = {
      hidden: { opacity: 0 },
      show: { opacity: 1, transition: { staggerChildren: 0.1 } }
    };

    const itemVariants = {
      hidden: { opacity: 0, y: 30 },
      show: { opacity: 1, y: 0, transition: { type: "spring", stiffness: 300, damping: 24 } }
    };

    function ProductCard({ product }) {
      const { setActiveProduct } = useStore();
      const [currentImg, setCurrentImg] = useState(0);

      const fotos = product?.fotos || (product?.image ? [product.image] : [`https://placehold.co/300x300/1C2039/00E5FF?text=${encodeURIComponent(product?.name || 'Tech')}`]);

      const handleNextImg = (e) => {
        e.stopPropagation();
        setCurrentImg((prev) => (prev + 1) % fotos.length);
      };

      const handlePrevImg = (e) => {
        e.stopPropagation();
        setCurrentImg((prev) => (prev - 1 + fotos.length) % fotos.length);
      };

      const handleWhatsAppDirect = (e) => {
        e.stopPropagation();
        const msg = `Hola, me interesa el ${product.name} de $${product.price.toLocaleString('en-US')}`;
        window.open(`https://wa.me/573005054912?text=${encodeURIComponent(msg)}`, '_blank');
      };

      return (
        <motion.div variants={itemVariants} className="group relative glass border border-white/10 rounded-2xl overflow-hidden cursor-pointer transition-all duration-500 hover:-translate-y-3 hover:shadow-[0_8px_30px_#00E5FF40,0_0_20px_#B026FF30] hover:border-neon-cyan/50" onClick={() => setActiveProduct(product)}>

          {/* Glow corner accent */}
          <div className="absolute top-0 right-0 w-32 h-32 bg-gradient-to-bl from-neon-purple/30 via-neon-cyan/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none" />

          {/* Promo Badge */}
          {product?.isPromo && (
            <div className="absolute top-3 right-3 z-10 bg-gradient-to-r from-neon-pink to-neon-purple px-3 py-1 text-[10px] uppercase font-black tracking-widest text-white rounded-full shadow-[0_0_15px_#FF2D9580]">
              Oferta Neón
            </div>
          )}

          <div className="relative h-56 bg-dark-900/40 border-b border-white/5 overflow-hidden p-6 flex items-center justify-center">
            
            {/* Image Slider Controls (if multiple photos) */}
            {fotos.length > 1 && (
              <>
                <button onClick={handlePrevImg} className="absolute left-2 z-20 p-1.5 bg-black/40 hover:bg-neon-cyan/30 text-white rounded-full backdrop-blur-md opacity-0 group-hover:opacity-100 transition-all">
                  <Lucide.ChevronLeft size={16} />
                </button>
                <button onClick={handleNextImg} className="absolute right-2 z-20 p-1.5 bg-black/40 hover:bg-neon-cyan/30 text-white rounded-full backdrop-blur-md opacity-0 group-hover:opacity-100 transition-all">
                  <Lucide.ChevronRight size={16} />
                </button>
                {/* Dots indicator */}
                <div className="absolute bottom-2 flex gap-1.5 z-20">
                  {fotos.map((_, i) => (
                    <span key={i} className={`w-1.5 h-1.5 rounded-full transition-all ${i === currentImg ? 'bg-neon-cyan w-3' : 'bg-white/30'}`} />
                  ))}
                </div>
              </>
            )}

            <AnimatePresence mode="wait">
              <motion.img
                key={currentImg}
                initial={{ opacity: 0, scale: 0.95 }}
                animate={{ opacity: 1, scale: 1 }}
                exit={{ opacity: 0, scale: 1.05 }}
                transition={{ duration: 0.3 }}
                src={fotos[currentImg]} alt={product?.name}
                className="w-full h-full object-contain drop-shadow-[0_10px_15px_rgba(0,0,0,0.5)] group-hover:scale-105 transition-transform duration-700"
              />
            </AnimatePresence>
            
            <div className="absolute top-3 left-3 z-10 glass px-2.5 py-1 text-[10px] uppercase font-bold tracking-wider text-neon-cyan border border-neon-cyan/30 rounded-lg shadow-[0_0_10px_#00E5FF20]">
              {product?.category}
            </div>
          </div>

          <div className="p-5 flex flex-col h-[150px]">
            <h3 className="font-semibold text-sm text-gray-100 mb-1 line-clamp-2 group-hover:text-transparent group-hover:bg-clip-text group-hover:bg-gradient-to-r group-hover:from-neon-cyan group-hover:to-neon-purple transition-all duration-300" title={product?.name}>{product?.name}</h3>
            <p className="text-[11px] text-gray-500 mb-4 line-clamp-2 leading-relaxed">
              {product?.specs ? Object.values(product.specs).join(" • ") : 'Sin especificaciones'}
            </p>
            <div className="flex items-center justify-between mt-auto">
              <span className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-300 group-hover:from-neon-cyan group-hover:to-white transition-all tracking-tight">
                ${product?.price ? product.price.toLocaleString('en-US', { minimumFractionDigits: 0 }) : '0'}
              </span>
              <button onClick={handleWhatsAppDirect} className="w-10 h-10 rounded-xl glass border border-[#25D366]/30 flex items-center justify-center text-[#25D366] hover:bg-[#25D366] hover:text-white hover:border-[#25D366] transition-all duration-500 shadow-sm hover:shadow-[0_0_15px_rgba(37,211,102,0.6)]" title="Pedir por WhatsApp">
                <Lucide.MessageCircle size={18} />
              </button>
            </div>
          </div>
        </motion.div>
      );
    }

    function ProductGrid() {
      const { searchQuery, selectedCategory } = useStore();
      const [loading, setLoading] = useState(true);

      // Simulate 1.5s Skeleton Loader delay
      useEffect(() => {
        const timer = setTimeout(() => setLoading(false), 1500);
        return () => clearTimeout(timer);
      }, []);

      const filtered = useMemo(() => {
        let list = window.PRODUCTS || [];
        if (selectedCategory !== "Todos") list = list.filter(p => p?.category === selectedCategory);
        if (searchQuery.trim()) {
          const q = searchQuery.toLowerCase();
          list = list.filter(p => p?.name?.toLowerCase().includes(q) || Object.values(p?.specs || {}).some(val => val?.toLowerCase().includes(q)));
        }
        return list;
      }, [searchQuery, selectedCategory]);

      // Detect active categories for grouped rendering
      const categoriesToRender = useMemo(() => {
        const uniqueCats = [...new Set(filtered.map(p => p.category))];
        return uniqueCats;
      }, [filtered]);

      return (
        <section className="max-w-7xl mx-auto px-4 md:px-6 py-8">
          <CategoryFilters />

          {loading ? (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
              {Array.from({ length: 4 }).map((_, i) => (
                <div key={i} className="bg-dark-800/50 border border-white/[0.04] rounded-2xl overflow-hidden h-[360px] animate-skeleton">
                  <div className="h-52 bg-dark-700/50" />
                  <div className="p-5 space-y-3">
                    <div className="h-4 bg-dark-600/60 rounded w-3/4" />
                    <div className="h-3 bg-dark-600/60 rounded w-full" />
                    <div className="h-3 bg-dark-600/60 rounded w-5/6" />
                    <div className="h-8 bg-dark-600/60 rounded w-1/3 mt-4" />
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div className="flex flex-col gap-12">
              {categoriesToRender.length > 0 ? (
                categoriesToRender.map(cat => (
                  <div key={cat} className="flex flex-col gap-6">
                    <h2 className="text-2xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-neon-purple to-neon-cyan border-b border-white/10 pb-2 w-fit">
                      {cat}
                    </h2>
                    <motion.div variants={containerVariants} initial="hidden" animate="show" className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                      {filtered.filter(p => p.category === cat).map(product => <ProductCard key={product.id} product={product} />)}
                    </motion.div>
                  </div>
                ))
              ) : (
                <div className="py-24 flex flex-col items-center justify-center text-gray-500">
                  <Lucide.PackageX size={48} className="mb-4 text-dark-600" />
                  <p>No se encontraron productos en esta categoría.</p>
                </div>
              )}
            </div>
          )}
        </section>
      );
    }


    // ═══════════════════════════════════════════
    //  HIGH-CONVERSION QUICK VIEW MODAL
    // ═══════════════════════════════════════════
    function ImageMagnifier({ src }) {
      const [zoom, setZoom] = useState({ show: false, x: 0, y: 0 });

      const handleMove = (e) => {
        const { left, top, width, height } = e.currentTarget.getBoundingClientRect();
        const x = ((e.clientX - left) / width) * 100;
        const y = ((e.clientY - top) / height) * 100;
        setZoom({ show: true, x, y });
      };

      return (
        <div className="relative w-full h-full bg-dark-900 rounded-xl overflow-hidden magnifier-container flex items-center justify-center p-4 border border-white/5"
          onMouseMove={handleMove} onMouseLeave={() => setZoom({ ...zoom, show: false })}>
          <img src={src} className={`w-full h-full object-contain transition-opacity duration-200 ${zoom.show ? 'opacity-0' : 'opacity-100'}`} />

          {zoom.show && (
            <div className="absolute inset-0 z-10 pointer-events-none"
              style={{
                backgroundImage: `url(${src})`, backgroundPosition: `${zoom.x}% ${zoom.y}%`, backgroundSize: '250%',
              }} />
          )}
          {!zoom.show && (
            <div className="absolute bottom-3 right-3 bg-dark-800/80 px-2 py-1 rounded text-[10px] text-gray-400 border border-white/10 flex items-center gap-1">
              <Lucide.ZoomIn size={12} /> Hover para zoom
            </div>
          )}
        </div>
      );
    }

    function ProductModal() {
      const { activeProduct, setActiveProduct } = useStore();
      const [idx, setIdx] = useState(0);

      // Reset index when product changes
      useEffect(() => { setIdx(0); }, [activeProduct]);

      const handleWhatsAppDirect = () => {
        if (!activeProduct) return;
        const msg = `Hola, me interesa el ${activeProduct.name} de $${activeProduct.price.toLocaleString('en-US')}`;
        window.open(`https://wa.me/573005054912?text=${encodeURIComponent(msg)}`, '_blank');
      };

      return (
        <AnimatePresence>
          {activeProduct && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-6">
              <motion.div
                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                className="absolute inset-0 bg-black/80 backdrop-blur-sm"
                onClick={() => setActiveProduct(null)}
              />

              <motion.div
                initial={{ opacity: 0, scale: 0.95, y: 20 }} animate={{ opacity: 1, scale: 1, y: 0 }} exit={{ opacity: 0, scale: 0.95, y: 10 }}
                transition={{ type: "spring", damping: 25, stiffness: 300 }}
                className="relative w-full max-w-5xl max-h-[90vh] bg-dark-800 border border-white/10 shadow-2xl rounded-2xl overflow-hidden flex flex-col md:flex-row z-10"
              >
                <button onClick={() => setActiveProduct(null)} className="absolute top-4 right-4 z-20 p-2 bg-dark-700 hover:bg-neon-cyan/20 hover:text-neon-cyan rounded-full transition-colors border border-white/10">
                  <Lucide.X size={18} />
                </button>

                {/* Gallery Side */}
                <div className="w-full md:w-1/2 p-5 bg-dark-900/50 flex flex-col gap-4">
                  <div className="flex-1 min-h-[250px] md:min-h-[400px]">
                    <ImageMagnifier src={activeProduct?.fotos?.[0] || activeProduct?.image || `https://placehold.co/600x600/1C2039/00E5FF?text=${encodeURIComponent(activeProduct.name)}`} />
                  </div>
                </div>

                {/* Info Side */}
                <div className="w-full md:w-1/2 p-6 md:p-8 flex flex-col overflow-y-auto">
                  <span className="text-[10px] uppercase tracking-widest text-neon-purple font-bold mb-2">{activeProduct.category}</span>
                  <h2 className="text-2xl md:text-3xl font-black mb-3 leading-tight flex items-center gap-3">
                    {activeProduct.name}
                    {activeProduct.isPromo && <span className="bg-neon-pink text-[10px] px-2 py-1 rounded-md tracking-wider">PROMO</span>}
                  </h2>
                  <div className="text-3xl font-bold bg-gradient-to-r from-neon-cyan to-neon-purple bg-clip-text text-transparent mb-6">
                    ${activeProduct.price.toLocaleString('en-US', { minimumFractionDigits: 0 })}
                  </div>

                  {/* Specs Grid */}
                  <div className="mb-8 bg-dark-700/30 border border-white/5 rounded-xl overflow-hidden">
                    <div className="bg-dark-700 px-4 py-2 border-b border-white/5 text-xs font-semibold text-gray-400">Especificaciones Técnicas</div>
                    <div className="grid grid-cols-1 text-sm">
                      {Object.entries(activeProduct.specs).map(([key, value], i) => (
                        <div key={key} className={`flex justify-between px-4 py-2.5 ${i % 2 === 0 ? 'bg-white/[0.02]' : ''}`}>
                          <span className="text-gray-500">{key}</span>
                          <span className="font-medium text-right ml-4 text-white">{value}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Action Buttons */}
                  <div className="mt-auto flex flex-col gap-3">
                    <button
                      onClick={handleWhatsAppDirect}
                      className="w-full relative group overflow-hidden bg-dark-900 border border-[#25D366]/50 py-4 rounded-xl font-bold text-white text-sm flex items-center justify-center shadow-lg hover:shadow-[0_0_20px_rgba(37,211,102,0.4)] hover:border-[#25D366] transition-all"
                    >
                      <div className="absolute inset-0 bg-gradient-to-r from-[#25D366]/20 to-[#128C7E]/20 opacity-0 group-hover:opacity-100 transition-opacity" />
                      <div className="relative flex items-center gap-2">
                        <Lucide.MessageCircle size={18} className="text-[#25D366]" /> Pedir por WhatsApp
                      </div>
                    </button>
                    <div className="flex items-center justify-center gap-4 text-[11px] text-gray-500 mt-2">
                      <span className="flex items-center gap-1"><Lucide.Truck size={14} className="text-neon-cyan/70" /> Envío Inmediato</span>
                      <span className="flex items-center gap-1"><Lucide.ShieldCheck size={14} className="text-neon-cyan/70" /> Garantía Oficial</span>
                    </div>
                  </div>
                </div>

              </motion.div>
            </div>
          )}
        </AnimatePresence>
      );
    }


    // ═══════════════════════════════════════════
    //  SLIDE-OVER CART & WHATSAPP CHECKOUT
    // ═══════════════════════════════════════════
    // SlideOverCart removido por migración a venta directa vía WhatsApp.


    // ═══════════════════════════════════════════
    //  "WOW FACTOR" CONTEXT-AWARE CHATBOT
    // ═══════════════════════════════════════════
    
    // ⚠️ ATENCIÓN: Por seguridad y practicidad, en producción la API Key
    // no debe ir en el frontend, sino llamarse desde un backend (ej. Next.js Route Handler).
    // Para efectos de esta demo, colocamos un placeholder. Reemplaza con tu Key de Groq.
    const GROQ_API_KEY = 'gsk_YOUR_API_KEY_HERE'; // Reemplazar con key real
    
    async function fetchGroqIA(userMessage, productsContext, activeProduct) {
      if (GROQ_API_KEY === 'gsk_YOUR_API_KEY_HERE') {
        return "⚠️ **[Modo Demo]** No se ha configurado la API Key de Groq. Para que la IA funcione, edita el archivo `index.html` (Línea ~670) y pon tu API Key real en `GROQ_API_KEY`.\n\n_Tu catálogo actual tiene " + (productsContext?.length || 0) + " productos._";
      }

      try {
        const systemPrompt = `
          Eres "Aura", la asesora experta y ultra-persuasiva de "Tech Market", un e-commerce futurista de tecnología premium.
          Tu personalidad es servicial, brillante y directa. Hablas con confianza sobre el hardware más avanzado.
          
          Catálogo actual disponible:
          ${JSON.stringify(productsContext, null, 2)}
          
          Protocolo de respuesta:
          1. Solo puedes ofrecer productos que estén en el JSON. No inventes precios.
          2. Si no hay stock exacto, recomienda lo más cercano con entusiasmo.
          3. Estilo: Usa negritas para nombres y precios. Sé breve pero impactante.
          4. Contexto: El cliente está viendo: ${activeProduct ? `"${activeProduct.name}"` : 'la página principal'}.
          5. Objetivo final: Convencer al cliente de que este es el mejor momento para comprar y que puede contactarnos por WhatsApp para cerrar el trato.
        `;

        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${GROQ_API_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: "llama3-8b-8192", // Modelo rápido y eficiente de Groq
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user", content: userMessage }
            ],
            temperature: 0.6,
            max_tokens: 250
          })
        });

        if (!response.ok) throw new Error('Error en la API');
        
        const data = await response.json();
        return data.choices[0].message.content;
      } catch (error) {
        console.error("Error AI:", error);
        return "Lo siento, en este momento nuestros servidores de IA están ocupados. Por favor intenta más tarde o contáctanos por WhatsApp.";
      }
    }

    function Chatbot() {
      const { activeProduct } = useStore();
      const [isOpen, setIsOpen] = useState(false);
      const [msgs, setMsgs] = useState([]);
      const [input, setInput] = useState('');
      const [typing, setTyping] = useState(false);
      const endRef = useRef(null);

      // Auto-scroll
      useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs, typing]);

      const addBot = useCallback((txt) => {
        setTyping(true);
        setTimeout(() => {
          setMsgs(p => [...p, { r: 'bot', t: txt }]);
          setTyping(false);
        }, 800);
      }, []);

      const handleOpen = () => {
        setIsOpen(true);
        // Wow factor: Read context!
        if (msgs.length === 0) {
          if (activeProduct) {
            addBot(`¡Excelente elección el **${activeProduct.name}**! ¿Quieres saber algo sobre sus especificaciones o compatibilidad? 🚀`);
          } else {
            addBot('¡Hola! 👋 Soy tu asesor experto impulsado por Inteligencia Artificial. Conozco todo el catálogo de Tech Market. ¿Qué buscas hoy?');
          }
        }
      };

      // Re-context if product changes while open
      useEffect(() => {
        if (isOpen && activeProduct && msgs.length > 0) {
          addBot(`Noté que ahora estás explorando el **${activeProduct.name}**. ¡Buena actualización! ¿Dudas sobre su rendimiento?`);
        }
      }, [activeProduct]);

      const handleSend = async () => {
        if (!input.trim() || typing) return;
        
        const userText = input.trim();
        setMsgs(p => [...p, { r: 'user', t: userText }]);
        setInput('');
        setTyping(true);
        
        // Llamada a Groq AI pasando el contexto actual
        const aiResponse = await fetchGroqIA(userText, window.PRODUCTS || [], activeProduct);
        
        setMsgs(p => [...p, { r: 'bot', t: aiResponse }]);
        setTyping(false);
      };

      return (
        <>
          {/* General WhatsApp FAB */}
          <motion.a
            href="https://wa.me/573005054912" target="_blank" rel="noreferrer"
            whileHover={{ scale: 1.1 }} whileTap={{ scale: 0.9 }}
            className="fixed bottom-24 right-6 z-[105] w-14 h-14 rounded-full bg-[#25D366] flex items-center justify-center shadow-lg shadow-[#25D366]/40 hover:shadow-[#25D366]/60 animate-[float_4s_ease-in-out_infinite] group"
          >
            <Lucide.MessageCircle size={28} className="text-white relative z-10" />
            
            {/* Tooltip */}
            <div className="absolute right-full mr-4 rounded-xl glass border border-white/10 px-3 py-1.5 whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none text-xs font-semibold text-white shadow-xl flex items-center gap-1.5">
              <span className="w-1.5 h-1.5 rounded-full bg-[#25D366] animate-pulse" /> Haz tu pedido aquí
            </div>
          </motion.a>

          {/* Botón flotante IA */}
          {!isOpen && (
            <motion.button
              whileHover={{ scale: 1.1 }} whileTap={{ scale: 0.9 }}
              onClick={handleOpen}
              className="fixed bottom-6 right-6 z-[110] w-14 h-14 rounded-full neon-btn flex items-center justify-center shadow-xl shadow-neon-cyan/40 hover:shadow-neon-cyan/60 animate-[float_4s_ease-in-out_infinite]"
            >
              <Lucide.Bot size={26} className="text-white" />
            </motion.button>
          )}

          {/* Widget */}
          <AnimatePresence>
            {isOpen && (
              <motion.div
                initial={{ opacity: 0, y: 50, scale: 0.9 }} animate={{ opacity: 1, y: 0, scale: 1 }} exit={{ opacity: 0, y: 20, scale: 0.9 }}
                className="fixed bottom-6 right-6 z-[110] w-[360px] max-w-[calc(100vw-2rem)] h-[500px] max-h-[calc(100vh-6rem)] bg-dark-800 border border-white/10 rounded-2xl shadow-2xl flex flex-col overflow-hidden"
              >
                {/* Header */}
                <div className="bg-gradient-to-r from-dark-700 to-dark-800 p-4 border-b border-white/5 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-full bg-neon-purple/20 border border-neon-purple/50 flex items-center justify-center shadow-[0_0_15px_#B026FF40]">
                      <Lucide.Bot size={20} className="text-neon-purple" />
                    </div>
                    <div>
                      <h3 className="text-sm font-bold text-white">Experto Tech</h3>
                      <div className="flex items-center gap-1.5 mt-0.5">
                        <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse" />
                        <span className="text-[10px] text-gray-400 uppercase tracking-wide">En línea activo</span>
                      </div>
                    </div>
                  </div>
                  <button onClick={() => setIsOpen(false)} className="text-gray-500 hover:text-white p-1 rounded-md hover:bg-white/10"><Lucide.ChevronDown size={20} /></button>
                </div>

                {/* Chat Body */}
                <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-dark-900/50">
                  {msgs.map((m, i) => (
                    <div key={i} className={`flex ${m.r === 'user' ? 'justify-end' : 'justify-start'}`}>
                      <div className={`max-w-[85%] p-3 text-sm rounded-2xl ${m.r === 'user' ? 'bg-neon-cyan/10 border border-neon-cyan/30 text-white rounded-br-sm'
                        : 'bg-dark-700 border border-white/5 text-gray-200 rounded-bl-sm leading-relaxed'
                        }`}>
                        {/* Basic Markdown bold parser for bot */}
                        {m.t.split('**').map((part, index) => index % 2 === 1 ? <strong key={index} className="text-white">{part}</strong> : part)}
                      </div>
                    </div>
                  ))}
                  {typing && (
                    <div className="flex justify-start">
                      <div className="bg-dark-700 border border-white/5 px-4 py-3 rounded-2xl rounded-bl-sm flex gap-1.5 items-center">
                        <span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0ms' }} />
                        <span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '150ms' }} />
                        <span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '300ms' }} />
                      </div>
                    </div>
                  )}
                  <div ref={endRef} />
                </div>

                {/* Input */}
                <div className="p-3 bg-dark-800 border-t border-white/5">
                  <div className="relative flex items-center">
                    <input
                      type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                      placeholder="Escribe tu consulta tecnológica..."
                      className="w-full bg-dark-900 border border-white/10 rounded-full pl-4 pr-12 py-3 text-sm focus:outline-none focus:border-neon-purple/50 focus:bg-dark-800 transition-colors"
                    />
                    <button onClick={handleSend} className="absolute right-1.5 w-9 h-9 bg-neon-purple/20 text-neon-purple hover:bg-neon-purple hover:text-white rounded-full flex items-center justify-center transition-all">
                      <Lucide.Send size={16} className="ml-0.5" />
                    </button>
                  </div>
                </div>
              </motion.div>
            )}
          </AnimatePresence>
        </>
      );
    }

    // ═══════════════════════════════════════════
    //  MAIN LAYOUT & APP
    // ═══════════════════════════════════════════
    function App() {
      return (
        <StoreProvider>
          <div className="min-h-screen bg-[#0B0D17] text-white selection:bg-neon-cyan/30 selection:text-white pb-20">
            <TopBar />
            <Header />

            {/* Premium Hero Section */}
            <div className="relative overflow-hidden pt-12 pb-16">
              <div className="absolute top-0 right-0 -translate-y-1/2 translate-x-1/4 w-[600px] h-[600px] bg-neon-cyan/10 rounded-full blur-[120px] pointer-events-none" />
              <div className="absolute bottom-0 left-0 translate-y-1/2 -translate-x-1/4 w-[600px] h-[600px] bg-neon-purple/10 rounded-full blur-[120px] pointer-events-none" />
              
              <div className="max-w-7xl mx-auto px-4 md:px-6 relative z-10">
                <motion.div 
                  initial={{ opacity: 0, y: 20 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{ duration: 0.8 }}
                  className="max-w-3xl"
                >
                  <span className="inline-block px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-xs font-bold text-neon-cyan tracking-widest uppercase mb-6">
                    Nueva Era Neón
                  </span>
                  <h1 className="text-5xl md:text-7xl font-black mb-6 leading-tight">
                    El Hardware que <br />
                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-neon-cyan via-white to-neon-purple">
                      define tu futuro.
                    </span>
                  </h1>
                  <p className="text-gray-400 text-lg md:text-xl mb-10 max-w-xl leading-relaxed">
                    Catálogo exclusivo de componentes premium y dispositivos de alto rendimiento. Garantía directa, asesoría con IA y envíos inmediatos.
                  </p>
                  
                  <div className="flex flex-wrap gap-4">
                    <button onClick={() => document.getElementById('grid-start')?.scrollIntoView({ behavior: 'smooth' })} className="px-8 py-4 rounded-2xl neon-btn font-bold text-white shadow-xl flex items-center gap-2">
                       Explorar Catálogo <Lucide.ArrowRight size={18} />
                    </button>
                    <a href="https://wa.me/573005054912" target="_blank" className="px-8 py-4 rounded-2xl bg-dark-700 border border-white/10 hover:border-white/20 font-bold text-gray-200 transition-all flex items-center gap-2">
                      Hablar con Asesor
                    </a>
                  </div>
                </motion.div>
                
                {/* Visual Stats */}
                <div className="grid grid-cols-2 md:grid-cols-4 gap-8 mt-20 border-t border-white/5 pt-12">
                  {[
                    { label: 'Productos Genuinos', val: '100%', color: 'text-neon-cyan' },
                    { label: 'Envíos Nacionales', val: '24h', color: 'text-neon-purple' },
                    { label: 'Garantía Total', val: 'Directa', color: 'text-neon-pink' },
                    { label: 'Asistencia IA', val: '24/7', color: 'text-white' }
                  ].map((s, i) => (
                    <motion.div 
                      key={i}
                      initial={{ opacity: 0 }}
                      animate={{ opacity: 1 }}
                      transition={{ delay: 0.2 * i }}
                      className="flex flex-col"
                    >
                      <span className={`text-2xl font-black ${s.color}`}>{s.val}</span>
                      <span className="text-xs text-gray-500 font-medium uppercase tracking-wider mt-1">{s.label}</span>
                    </motion.div>
                  ))}
                </div>
              </div>
            </div>

            <div id="grid-start" className="max-w-7xl mx-auto px-4 md:px-6" />

            <ProductGrid />

            {/* Modals & Overlays */}
            <ProductModal />
            <SlideOverCart />
            <Chatbot />
          </div>
        </StoreProvider>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
